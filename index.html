<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Centro Clínico GS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-error {
      background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c;
      border-radius: 8px; padding: .65rem 1rem; font-size: .84rem;
      margin-bottom: 1rem; display: none;
    }
  </style>
</head>
<body>
  <div class="login-bg">
    <div class="login-card">

      <!-- Logo -->
      <img src="img/logo.png" alt="Centro Clínico Garcez Santos" class="login-logo-img">
      <p>Sistema de Controle de Repasse</p>

      <div class="login-error" id="loginError">Usuário ou senha incorretos.</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group" style="text-align:left">
          <label class="form-label">Usuário</label>
          <input type="text" id="username" class="form-control" placeholder="Digite seu usuário" autocomplete="username" required>
        </div>
        <div class="form-group" style="text-align:left; position:relative">
          <label class="form-label">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Digite sua senha" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btnLogin" style="margin-top:.5rem; padding:.7rem; font-size:.95rem;">
          Entrar
        </button>
      </form>

      <p style="margin-top:1.5rem; font-size:.72rem; color:#9ca3af;">
        © 2026 Centro Clínico GS · Todos os direitos reservados
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    // Já logado? Redireciona
    if (sessionStorage.getItem('cgs_auth')) {
      window.location.href = 'lancamento.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('loginError');
      const btn = document.getElementById('btnLogin');

      if (u === CONFIG.USERNAME && p === CONFIG.PASSWORD) {
        err.style.display = 'none';
        btn.innerHTML = '<span class="spinner"></span>';
        btn.disabled = true;
        sessionStorage.setItem('cgs_auth', '1');
        setTimeout(() => window.location.href = 'lancamento.html', 600);
      } else {
        err.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
