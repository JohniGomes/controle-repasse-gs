<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançamento — Centro Clínico GS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loader -->
  <div class="page-loader" id="pageLoader" style="display:none">
    <div class="spin-big"></div>
    <p>Carregando dados...</p>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8 2 5 5 5 8c0 2 .5 3.5 1.5 5L8 20c.3 1.2 1.2 2 2.2 2h3.6c1 0 1.9-.8 2.2-2l1.5-7C18.5 11.5 19 10 19 8c0-3-3-6-7-6z"/>
        <path d="M9 2.5c0 1.5 1 3 3 3s3-1.5 3-3"/>
      </svg>
      <span>Centro Clínico GS</span>
    </div>
    <nav class="header-nav">
      <a href="dashboard.html" class="btn-header btn-header-accent">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <button class="btn-header" onclick="logout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </nav>
  </header>

  <main class="page-body">

    <!-- Formulário de Lançamento -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header">
        <h2>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          Novo Lançamento
        </h2>
      </div>

      <div class="card-body">
        <form id="lancamentoForm" onsubmit="salvarLancamento(event)">

          <!-- Linha 1: Data + Dentista -->
          <div class="form-row form-row-2" style="margin-bottom:1rem">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Data *</label>
              <input type="date" id="data" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Dentista *</label>
              <div class="input-group">
                <select id="dentista" class="form-select" required>
                  <option value="">Selecione...</option>
                </select>
                <button type="button" class="btn btn-success btn-icon" title="Cadastrar dentista" onclick="openModal('modalAddDentista')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button type="button" class="btn btn-danger btn-icon" title="Excluir dentista selecionado" onclick="deleteDentistaSelected()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Linha 2: Paciente + Procedimento -->
          <div class="form-row form-row-2" style="margin-bottom:1rem">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Paciente *</label>
              <input type="text" id="paciente" class="form-control" placeholder="Nome do paciente" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Procedimento *</label>
              <select id="procedimento" class="form-select" required onchange="calcularRepasse()">
                <option value="">Selecione...</option>
              </select>
            </div>
          </div>

          <!-- Tipo de Atendimento -->
          <div class="form-group">
            <label class="form-label">Tipo de Atendimento *</label>
            <div class="tipo-group">
              <label class="tipo-option selected-particular" id="tipoParticular" onclick="selectTipo('particular')">
                <input type="radio" name="tipo" id="radioParticular" value="Particular" checked>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 000 5H12"/><path d="M12 7h4.5a2.5 2.5 0 010 5H12"/></svg>
                Particular
              </label>
              <label class="tipo-option" id="tipoConvenio" onclick="selectTipo('convenio')">
                <input type="radio" name="tipo" id="radioConvenio" value="Convênio">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                Convênio
              </label>
            </div>
          </div>

          <!-- Convênio (só aparece se Convênio selecionado) -->
          <div id="convenioRow" style="display:none; margin-bottom:1rem">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Convênio *</label>
              <div class="input-group">
                <select id="convenio" class="form-select">
                  <option value="">Selecione...</option>
                </select>
                <button type="button" class="btn btn-success btn-icon" title="Cadastrar convênio" onclick="openModal('modalAddConvenio')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button type="button" class="btn btn-danger btn-icon" title="Excluir convênio selecionado" onclick="deleteConvenioSelected()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Linha 3: Valor + Repasse -->
          <div class="form-row form-row-2" style="margin-bottom:1.5rem">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Valor Cobrado (R$) *</label>
              <input type="number" id="valor" class="form-control" placeholder="0,00" min="0" step="0.01" required oninput="calcularRepasse()">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Repasse ao Dentista</label>
              <div style="display:flex;align-items:center;gap:.8rem">
                <input type="hidden" id="repasse">
                <div style="flex:1;padding:.55rem .85rem;background:#f8faff;border:1.5px solid var(--border);border-radius:8px;font-weight:700;color:var(--primary);font-size:1rem">
                  <span id="repasseDisplay">—</span>
                </div>
                <span style="font-size:.75rem;color:var(--text-muted);white-space:nowrap" id="repasseInfo">
                  Selecione o procedimento
                </span>
              </div>
            </div>
          </div>

          <!-- Botão Salvar -->
          <button type="submit" class="btn btn-primary btn-full" id="btnSalvar" style="padding:.75rem;font-size:.95rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Salvar Lançamento
          </button>

        </form>
      </div>
    </div>


  </main>

  <!-- Modal: Adicionar Dentista -->
  <div class="modal-overlay" id="modalAddDentista">
    <div class="modal-box">
      <h3>Cadastrar Dentista</h3>
      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input type="text" id="newDentistaName" class="form-control" placeholder="Dr(a). Nome Sobrenome"
               onkeydown="if(event.key==='Enter'){event.preventDefault();addDentista()}">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('modalAddDentista')">Cancelar</button>
        <button class="btn btn-success" onclick="addDentista()">Cadastrar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Adicionar Convênio -->
  <div class="modal-overlay" id="modalAddConvenio">
    <div class="modal-box">
      <h3>Cadastrar Convênio</h3>
      <div class="form-group">
        <label class="form-label">Nome do convênio</label>
        <input type="text" id="newConvenioName" class="form-control" placeholder="Ex: Bradesco Saúde"
               onkeydown="if(event.key==='Enter'){event.preventDefault();addConvenio()}">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('modalAddConvenio')">Cancelar</button>
        <button class="btn btn-success" onclick="addConvenio()">Cadastrar</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/lancamento.js"></script>
  <script>
    // Atualiza info de repasse ao mudar procedimento ou tipo
    document.getElementById('procedimento').addEventListener('change', () => {
      const tipo = document.getElementById('radioParticular').checked ? 'particular' : 'convenio';
      const info = document.getElementById('repasseInfo');
      if (tipo === 'particular') {
        const opt = document.getElementById('procedimento');
        const rep = opt.options[opt.selectedIndex]?.dataset.repasse;
        info.textContent = rep ? `Fixo: ${formatCurrency(rep)}` : 'Selecione o procedimento';
      } else {
        info.textContent = '35% do valor';
      }
    });
  </script>
</body>
</html>
